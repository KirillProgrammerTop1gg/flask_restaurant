{% extends "base.html" %} {% block title %}Нова позиція — Maison{% endblock %}
{% block content %}
<div class="wrapper wrapper--narrow">
  <div class="page-header">
    <p class="page-header__eyebrow">Адмін-панель</p>
    <h1 class="page-header__title">Нова <em>позиція</em></h1>
    <div class="page-header__divider"></div>
  </div>

  <div class="card">
    <form class="form" method="post" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />

      <div class="form__row">
        <div class="form__group">
          <label class="form__label" for="name">Назва страви</label>
          <input
            class="form__input"
            type="text"
            id="name"
            name="name"
            placeholder="Наприклад: Тартар з лосося"
            required
          />
        </div>

        <div class="form__group">
          <label class="form__label" for="price">Ціна (грн)</label>
          <input
            class="form__input"
            type="number"
            id="price"
            name="price"
            placeholder="380"
            required
          />
        </div>
      </div>

      <div class="form__row">
        <div class="form__group">
          <label class="form__label" for="weight">Вага (г)</label>
          <input
            class="form__input"
            type="number"
            id="weight"
            name="weight"
            placeholder="200"
            required
          />
        </div>

        <div class="form__group">
          <label class="form__label" for="img">Фото страви</label>
          <input
            class="form__file"
            type="file"
            id="img"
            name="img"
            accept="image/*"
            required
          />
          <div class="img-preview" id="imgPreview">
            <img id="imgPreviewSrc" src="" alt="Попередній перегляд" />
          </div>
        </div>
      </div>

      <div class="form__group">
        <label class="form__label" for="ingredients">Інгредієнти</label>
        <textarea
          class="form__textarea"
          id="ingredients"
          name="ingredients"
          placeholder="Лосось, авокадо, каперси, цитрусова заправка"
          required
        ></textarea>
      </div>

      <div class="form__group">
        <label class="form__label" for="description">Опис</label>
        <textarea
          class="form__textarea"
          id="description"
          name="description"
          placeholder="Розкажіть про страву..."
          style="min-height: 130px"
          required
        ></textarea>
      </div>

      <button class="btn btn--primary btn--full" type="submit">
        Додати страву
      </button>
    </form>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="{{ url_for('static', filename='js/preview.js') }}"></script>
{% endblock %}
